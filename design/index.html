
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusMed AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #020617;
      --text-color: #e2e8f0;
      --accent-color: #22d3ee;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-color);
      color: var(--text-color);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      transition: background-color 0.5s ease, color 0.5s ease;
    }

    .light-theme {
      --bg-color: #f8fafc;
      --text-color: #0f172a;
      --accent-color: #0891b2;
    }

    .font-orbitron {
      font-family: 'Orbitron', sans-serif;
    }

    .hologram-glow {
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.3), inset 0 0 10px rgba(34, 211, 238, 0.1);
    }
    
    .light-theme .hologram-glow {
      box-shadow: 0 0 15px rgba(8, 145, 178, 0.2), inset 0 0 10px rgba(8, 145, 178, 0.05);
    }

    .scanline {
      width: 100%;
      height: 2px;
      background: rgba(34, 211, 238, 0.2);
      position: absolute;
      top: 0;
      left: 0;
      animation: scan 4s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }

    .glass-panel {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(34, 211, 238, 0.2);
    }

    .light-theme .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(8, 145, 178, 0.15);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #1e293b;
      border-radius: 10px;
    }
    .light-theme ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #22d3ee;
    }
  </style>
